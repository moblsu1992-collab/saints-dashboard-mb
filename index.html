<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Saints NFL Scouting Dashboard — 2025/26</title>
<style>
:root{
 --navy:#0e1830;--navy2:#1f3a63;--navy3:#2c4d80;
 --gold:#d4bd8a;--gold-deep:#b6975a;--gold-soft:#f3ebda;
 --ink:#15233f;--text:#28323f;--muted:#64748b;--faint:#94a3b8;
 --line:#e7ebf2;--line2:#eff2f8;--bg:#eef2f8;--card:#ffffff;
 --blue:#2e5496;--good:#1e7a34;--good-bg:#e7f3ea;--bad:#b23b3b;--bad-bg:#fbeaea;--warn:#b07d12;
 --r-sm:6px;--r:10px;--r-lg:14px;
 --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:32px;
 --sh-1:0 1px 2px rgba(16,26,51,.04);--sh-2:0 2px 8px rgba(16,26,51,.06);--sh-3:0 8px 24px rgba(16,26,51,.10);
 --font:"Inter","Segoe UI",-apple-system,Roboto,Helvetica,Arial,sans-serif;
 --mono:"SF Mono",ui-monospace,"Cascadia Mono","Segoe UI Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--font);color:var(--text);background:var(--bg);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;font-feature-settings:"tnum" 1,"cv05" 1}
::selection{background:var(--gold);color:var(--navy)}
/* ---------- header ---------- */
header{background:radial-gradient(120% 140% at 0% 0%,var(--navy2),var(--navy) 70%);color:#fff;padding:18px 22px 16px;border-bottom:2px solid var(--gold)}
header h1{margin:0;font-size:21px;font-weight:800;letter-spacing:-.2px;display:flex;flex-wrap:wrap;align-items:center;gap:2px 8px}
header h1 .g{color:var(--gold)}
header .sub{font-size:12px;opacity:.78;margin-top:4px;font-weight:500;letter-spacing:.1px}
/* ---------- nav ---------- */
nav{display:flex;flex-wrap:wrap;gap:5px;padding:9px 16px;background:var(--navy);position:sticky;top:0;z-index:30;box-shadow:var(--sh-2)}
nav button{position:relative;background:transparent;color:#c4d0e4;border:1px solid transparent;padding:7px 13px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;transition:background .15s,color .15s,transform .1s}
nav button:hover{background:rgba(255,255,255,.10);color:#fff}
nav button:active{transform:translateY(1px)}
nav button.on{background:var(--gold);color:var(--navy);border-color:var(--gold);box-shadow:0 2px 8px rgba(212,189,138,.3)}
/* ---------- layout ---------- */
main{max-width:1200px;margin:0 auto;padding:22px 18px 72px}
section{display:none}
section.on{display:block;animation:fade .28s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
h2{font-size:20px;font-weight:800;color:var(--ink);margin:4px 0 3px;letter-spacing:-.3px}
.lead{color:var(--muted);font-size:13px;margin:0 0 18px;max-width:78ch;line-height:1.5}
/* ---------- cards ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 20px;margin-bottom:18px;box-shadow:var(--sh-1)}
.card:hover{box-shadow:var(--sh-2)}
/* ---------- tables ---------- */
table{border-collapse:collapse;width:100%;font-size:12.5px}
th,td{padding:7px 10px;border:none;border-bottom:1px solid var(--line2);text-align:center;white-space:nowrap}
thead th{background:var(--navy2);color:#eaf0fa;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;position:relative;padding-right:18px;user-select:none}
thead th:first-child{border-top-left-radius:var(--r-sm)}
thead th:last-child{border-top-right-radius:var(--r-sm)}
thead th::after{content:"⇅";position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9px;opacity:.32}
thead th:hover{background:var(--navy3)}
thead th:hover::after{opacity:.9}
thead th.tl{padding-right:18px}
td.tl,th.tl{text-align:left}
tbody tr{transition:background .12s}
tbody tr:nth-child(even) td{background:#fafbfd}
tbody tr:hover td{background:#eef3fa}
tbody tr:hover td:first-child{box-shadow:inset 3px 0 0 var(--gold)}
tbody td{color:var(--text)}
tr.no td{background:var(--gold-soft) !important;font-weight:700;color:var(--ink)}
tr.no td:first-child{box-shadow:inset 3px 0 0 var(--gold-deep)}
tr.lg td{background:#fbf6e8 !important;font-weight:700;color:#6a6450}
.scroll{overflow-x:auto;border-radius:var(--r-sm)}
.scroll::-webkit-scrollbar{height:9px}
.scroll::-webkit-scrollbar-thumb{background:#cdd6e4;border-radius:9px}
.scroll::-webkit-scrollbar-track{background:transparent}
/* ---------- sub-navigation (segmented) ---------- */
.subnav{display:inline-flex;gap:3px;flex-wrap:wrap;margin:0 0 16px;padding:3px;background:#e7ecf4;border-radius:10px}
.subnav button{background:transparent;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:600;font-size:12.5px;color:#5a6675;transition:background .15s,color .15s,box-shadow .15s}
.subnav button:hover{color:var(--navy2)}
.subnav button.on{background:#fff;color:var(--navy2);box-shadow:var(--sh-1)}
.subnav select{margin:0}
.subgroups{display:flex;flex-wrap:wrap;gap:8px 16px;align-items:flex-end;margin:0 0 16px}
.subgroup{display:flex;flex-direction:column;gap:4px}
.subgroup .subnav{margin:0}
.subcap{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#8a93a3;padding-left:5px}
.fzgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.fzc{background:#f5f7fa;border:1px solid #e3e7ee;border-radius:8px;padding:8px;cursor:pointer;transition:background .12s}
.fzc:hover{background:#eaf0f8}
.fzc-h{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#8a93a3;margin-bottom:4px}
.fzc-l{font-size:12.5px;font-weight:600;color:var(--navy2);line-height:1.2}
.fzc-v{font-size:11.5px;color:#5a6675;margin-top:2px}
.fzc-rz{font-size:10px;font-weight:600;color:#a2543a;margin-top:2px}
.shcard{border-top:3px solid #2e5496}
.shcoaches{display:flex;flex-wrap:wrap;gap:6px 18px;margin:4px 0 8px}
.shc{display:flex;flex-direction:column;gap:1px}
.shc-r{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#8a93a3}
.shc-n{font-size:13px;font-weight:600;color:var(--navy2)}
.shnew{font-size:8.5px;font-weight:800;color:#fff;background:#a23b3b;padding:1px 4px;border-radius:4px;vertical-align:middle;letter-spacing:.04em}
.shwarn{background:rgba(178,59,59,.09);border-left:3px solid #a23b3b;padding:7px 10px;border-radius:6px;font-size:12px;color:#7a2e2e;margin:6px 0}
.shkv{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:5px 14px;margin:4px 0 8px}
.shkv .shk{font-size:11px;color:#5a6675;margin-right:6px}
.shkv .shv{font-size:13px;font-weight:600;color:var(--navy2)}
.shrk{font-size:11px;font-weight:700;color:#8a93a3}
.shunits{display:grid;grid-template-columns:repeat(auto-fit,minmax(84px,1fr));gap:5px}
.shunit{background:#f5f7fa;border:1px solid #e3e7ee;border-radius:7px;padding:5px 8px;display:flex;justify-content:space-between;align-items:baseline}
.shul{font-size:11px;color:#5a6675}
.shur{font-size:13px;font-weight:700}
.shros{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:4px 16px;font-size:12px}
.shros ul{margin:2px 0 6px;padding-left:16px}.shros li{margin:1px 0}
.shros b{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#8a93a3}
.shgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(116px,1fr));gap:6px;margin:4px 0 10px}
.shtile{background:#f5f7fa;border:1px solid #e3e7ee;border-radius:8px;padding:7px 9px}
.sht-l{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;color:#8a93a3;line-height:1.15;display:block;margin-bottom:3px}
.sht-row{display:flex;align-items:baseline;justify-content:space-between;gap:6px}
.sht-v{font-size:15px;font-weight:800;color:var(--navy2);line-height:1.1}
.sht-r{font-size:11.5px;font-weight:800;white-space:nowrap}
.fzmute{color:#aab4c2}
tr.cl{cursor:pointer}
tr.cl:hover td{background:#eef2f8}
/* ---------- overview hero strip ---------- */
.hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:8px;margin:0 0 18px}
.htile{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:10px 12px;box-shadow:var(--sh-1)}
.htile .hl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#8a93a3;display:block;margin-bottom:4px;line-height:1.2}
.htile .hv{font-size:20px;font-weight:800;color:var(--ink);line-height:1.05;letter-spacing:-.3px}
.htile .hs{font-size:10.5px;font-weight:600;color:var(--muted);margin-top:3px;line-height:1.25}
.htile.go{cursor:pointer;transition:border-color .12s,box-shadow .12s}
.htile.go:hover{border-color:var(--gold);box-shadow:var(--sh-2)}
/* ---------- drill affordances ---------- */
.fzc.cl{position:relative}
.fzc.cl::after{content:"top 50 ▸";position:absolute;top:7px;right:8px;font-size:8.5px;font-weight:700;color:#a8b2c2;letter-spacing:.03em}
.fzc.cl:hover::after{color:var(--blue)}
@media(max-width:640px){.fzc.cl::after{content:"▸"}}
/* ---------- back to top ---------- */
#totop{position:fixed;right:16px;bottom:18px;z-index:40;width:42px;height:42px;border-radius:50%;border:1px solid var(--gold);background:var(--navy);color:var(--gold);font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(14,24,48,.35);opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .2s,transform .2s}
#totop.show{opacity:.94;pointer-events:auto;transform:none}
#totop:hover{opacity:1}
/* ---------- chips, pills, badges ---------- */
.tier{display:inline-block;padding:2px 10px;border-radius:11px;font-size:11px;font-weight:700;color:#fff;letter-spacing:.2px}
.bar{height:9px;border-radius:5px;background:var(--gold)}
.barwrap{background:#eef1f6;border-radius:5px;width:70px;display:inline-block;vertical-align:middle;overflow:hidden}
.wts{display:flex;gap:22px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.wts label{font-size:12px;font-weight:600;color:var(--text);display:flex;flex-direction:column;gap:4px}
.wts input{width:160px;accent-color:var(--navy2)}
.pill{display:inline-flex;align-items:center;gap:4px;background:#f1f5fb;border:1px solid var(--line);border-radius:999px;padding:3px 11px;font-size:11.5px;margin:2px 4px 2px 0;color:var(--text)}
.note{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.5}
.banner{background:linear-gradient(0deg,#fdeee9,#fcf3ef);border:1px solid #f1c4b4;border-left:3px solid #d9794f;color:#8a3417;padding:9px 12px;border-radius:var(--r-sm);font-size:12.5px;margin:10px 0;font-weight:500}
.staff{font-size:13px;color:var(--muted);margin:3px 0 6px;font-weight:500}
.oppbtns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.oppbtns button{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:6px 11px 6px 8px;cursor:pointer;font-weight:700;font-size:12px;color:var(--text);transition:border-color .15s,background .15s,transform .1s,box-shadow .15s}
.oppbtns button:hover{border-color:var(--gold);box-shadow:var(--sh-1);transform:translateY(-1px)}
.oppbtns button.on{background:var(--gold);border-color:var(--gold);color:var(--navy);box-shadow:0 2px 8px rgba(212,189,138,.35)}
.oppbtns .obdiv{flex-basis:100%;height:0;margin:1px 0}
.oppbtns .oblab{width:100%;font-size:9.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:2px 0 -2px}
.tlogo{width:18px;height:18px;object-fit:contain;vertical-align:middle;flex:none}
.tlogo.sm{width:15px;height:15px}
.tcell{display:inline-flex;align-items:center;gap:5px}
.oppbtns button .tlogo{width:16px;height:16px}
.tchip{display:inline-flex;align-items:center;gap:7px}
.tchip .tlogo{width:22px;height:22px}
h2 .tlogo{width:30px;height:30px}
.sechead .tlogo{width:17px;height:17px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.35))}
.tcaccent{display:inline-block;width:4px;height:1.05em;border-radius:2px;vertical-align:-2px;margin-right:7px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:780px){.grid2{grid-template-columns:1fr}}
.sechead{font-weight:700;color:#fff;background:var(--navy2);padding:7px 12px;border-radius:8px;margin:18px 0 10px;font-size:12.5px;letter-spacing:.2px;display:flex;align-items:center;gap:6px}
.sechead.o{background:linear-gradient(90deg,#2e5496,#3a63a8)}
.sechead.d{background:linear-gradient(90deg,#375623,#48702f)}
small.src{color:rgba(255,255,255,.7);font-weight:500}
.sechead small.src{color:rgba(255,255,255,.72)}
select{padding:7px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:var(--text);cursor:pointer}
select:hover{border-color:var(--navy3)}
/* ---------- section intro band ---------- */
.intro{display:flex;align-items:flex-start;gap:10px;background:linear-gradient(90deg,var(--gold-soft),transparent);border-left:3px solid var(--gold);padding:8px 12px;border-radius:0 var(--r-sm) var(--r-sm) 0;margin:0 0 16px;font-size:12.5px;color:var(--text);line-height:1.5}
.kicker{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--gold-deep);margin-bottom:2px}
/* ---------- interactivity hint ---------- */
.hint{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--muted);background:#eef2f8;border:1px dashed #c5cfde;border-radius:999px;padding:2px 9px}
.hint::before{content:"☰";font-size:10px;opacity:.7}
.hintrow{display:flex;gap:6px;flex-wrap:wrap;margin:-8px 0 18px}
.pagehead{margin-bottom:2px}
/* ---------- data-viz primitives ---------- */
.hbar{position:relative;height:8px;border-radius:999px;background:#e9edf4;overflow:hidden;width:100%}
.hbar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--navy3),var(--navy2))}
.hbar.gold>i{background:linear-gradient(90deg,var(--gold),var(--gold-deep))}
.statline{display:flex;justify-content:space-between;align-items:baseline;gap:8px;font-size:11.5px;color:var(--muted);margin:3px 0}
.statline b{color:var(--ink);font-size:13px}
.delta-up{color:var(--good);font-weight:700}
.delta-dn{color:var(--bad);font-weight:700}
.delta-0{color:var(--faint);font-weight:600}
/* ---------- matchup (dumbbell) bars ---------- */
.mbars{margin-top:6px}
.mbhdr{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;margin:2px 0 8px}
.mbhdr .mbscale{font-size:8.5px;color:var(--faint);font-weight:700;white-space:nowrap}
.mbrow{display:grid;grid-template-columns:92px 1fr 50px;align-items:center;gap:9px;margin:6px 0}
.mblab{font-size:11px;color:var(--text);font-weight:600;text-align:right;line-height:1.15}
.mbtrack{position:relative;height:22px;background:linear-gradient(90deg,#e9f1ea,#f3f5f9 55%,#f8efef);border:1px solid var(--line);border-radius:7px}
.mbline{position:absolute;top:50%;height:4px;transform:translateY(-50%);border-radius:3px;opacity:.65}
.mbdot{position:absolute;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;color:#fff;box-shadow:0 1px 3px rgba(16,26,51,.3);border:1.5px solid #fff;z-index:2}
.mbdot.a{background:var(--navy2)}
.mbdot.b{background:var(--gold-deep);z-index:3}
.mbedge{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.2px;text-align:center;border-radius:6px;padding:3px 2px;line-height:1.1}
.mbedge.opp{color:#9b1c1c;background:#fbeaea}
.mbedge.sai{color:#7a5e1e;background:var(--gold-soft)}
.mbedge.even{color:var(--faint);background:#f1f3f7}
.mbk{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle;margin:0 2px 0 6px;border:1px solid #fff;box-shadow:0 0 0 1px var(--line)}
.mbk.a{background:var(--navy2)}.mbk.b{background:var(--gold-deep)}
.tblfb{margin-top:8px}
.tblfb summary{font-size:11px;color:var(--blue);font-weight:700;cursor:pointer;list-style:none;display:inline-flex;align-items:center;gap:5px}
.tblfb summary::before{content:"▸";font-size:9px;transition:transform .15s}
.tblfb[open] summary::before{transform:rotate(90deg)}
.tblfb[open] summary{margin-bottom:8px}
/* ---------- interactive field charts ---------- */
.fieldwrap{display:grid;grid-template-columns:minmax(0,360px) 1fr;gap:18px;align-items:start}
@media(max-width:760px){.fieldwrap{grid-template-columns:1fr}}
.fctrls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:0 0 12px}
.fctrls .fc-group{display:flex;flex-direction:column;gap:3px}
.fctrls label{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.fctrls select{min-height:38px;min-width:120px}
.fsvgwrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1);padding:8px}
.ffield{width:100%;height:auto;display:block;touch-action:manipulation}
.fdot{cursor:pointer;transition:r .1s}
.fdot.sel{stroke:#111;stroke-width:2.2}
.flegend{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 2px}
.lgchip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--text);background:#f1f5fb;border:1px solid var(--line);border-radius:999px;padding:4px 10px;cursor:pointer;user-select:none;min-height:30px}
.lgchip.off{opacity:.38;text-decoration:line-through}
.lgdot{width:11px;height:11px;border-radius:50%;display:inline-block}
.fdetail{margin-top:10px;background:#f8fafd;border:1px solid var(--line);border-left:3px solid var(--navy2);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:9px 12px;font-size:12px;min-height:30px;color:var(--text)}
.fdetail .big{font-weight:800;color:var(--ink);font-size:13px}
.fdetail .muted{color:var(--muted)}
.fagg{min-width:0}
.fstatrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
@media(max-width:420px){.fstatrow{grid-template-columns:repeat(2,1fr)}}
.fstat{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 10px;text-align:center;box-shadow:var(--sh-1)}
.fstat .v{font-size:18px;font-weight:800;color:var(--ink);line-height:1.1}
.fstat .l{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);margin-top:2px}
.fzrow{display:grid;grid-template-columns:74px 1fr 48px;align-items:center;gap:8px;margin:5px 0;font-size:11.5px}
.fzrow .zl{font-weight:700;color:var(--text);text-align:right;font-size:10.5px}
.fzrow .zb{position:relative;height:18px;background:#eef2f8;border-radius:5px;overflow:hidden}
.fzrow .zb>i{position:absolute;top:0;bottom:0;border-radius:5px}
.fzrow .zv{font-weight:800;text-align:left;font-size:11px}
.frecs{width:100%;font-size:11.5px;border-collapse:collapse}
.frecs th,.frecs td{padding:5px 7px;border-bottom:1px solid var(--line2);text-align:right;white-space:nowrap}
.frecs th{background:var(--navy2);color:#eaf0fa;font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;cursor:default;position:static}
.frecs td:first-child,.frecs th:first-child{text-align:left}
.frecs tbody tr{cursor:pointer}
.frecs tbody tr.sel td{background:var(--gold-soft);font-weight:700}
.fsub{font-size:12.5px;font-weight:700;color:var(--navy2);margin:14px 0 6px;display:flex;align-items:center;gap:6px}
.floading{padding:30px;text-align:center;color:var(--muted);font-size:13px}
/* ---------- self-scout: drive-sequencing bars + zone field ---------- */
.seqbars{margin-top:6px}
.seqrow{display:grid;grid-template-columns:1fr 130px 44px;align-items:center;gap:10px;margin:7px 0;font-size:11.5px}
.seql{color:var(--text);font-weight:600}
.seqtrack{height:14px;background:#eef2f8;border-radius:7px;overflow:hidden}
.seqtrack>i{display:block;height:100%;background:linear-gradient(90deg,var(--navy3),var(--navy2));border-radius:7px}

function condStyle(v,vals){if(typeof v!=='number'||!vals||vals.length<4)return '';const m=vals.reduce((a,b)=>a+b,0)/vals.length;const sd=Math.sqrt(vals.reduce((a,b)=>a+(b-m)*(b-m),0)/vals.length)||1;const z=(v-m)/sd;if(Math.abs(z)<0.9)return '';const a=Math.min(1,(Math.abs(z)-0.9)/1.6);return z>0?`background:rgba(46,84,150,${(0.12+0.42*a).toFixed(2)})`:`background:rgba(214,134,33,${(0.12+0.42*a).toFixed(2)})`;}

function condHi(v,vals){if(typeof v!=='number'||!vals||vals.length<3)return '';const m=vals.reduce((a,b)=>a+b,0)/vals.length;const sd=Math.sqrt(vals.reduce((a,b)=>a+(b-m)*(b-m),0)/vals.length)||1;const z=(v-m)/sd;if(z<0.9)return '';const a=Math.min(1,(z-0.9)/1.6);return `background:rgba(46,84,150,${(0.12+0.45*a).toFixed(2)})`;}

// Honors the OPPF situational filters (minus pers, so all groupings stay visible and the active one highlights).
function personnelLollipop(ab,side){
 const cut=cutF(ab,side,{...OPPF,pers:'all'});
 const NAMED=new Set(['11','12','13','21','10','22','20','23']);
 const g={}; let total=0;
 const add=(c,e)=>{const k=(c!=null&&NAMED.has(String(c)))?String(c):'Other';(g[k]=g[k]||{n:0,ep:[]});g[k].n++;if(e!=null)g[k].ep.push(e);total++;};
 cut.pass.forEach(p=>add(p[PI.pers],p[PI.epa]));
 cut.rush.forEach(p=>add(p[RI.pers],p[RI.epa]));
 if(!total)return '<p class="note">No plays in this cut.</p>';
 const rows=Object.entries(g).map(([code,o])=>({code,n:o.n,pct:100*o.n/total,epa:o.ep.length?fmean(o.ep):null})).filter(r=>r.n>=3).sort((a,b)=>b.n-a.n);
 if(!rows.length)return '<p class="note">No personnel grouping has enough snaps in this cut.</p>';
 const inv=side==='def', POS='#1f9d8a', NEG='#ef5a4a';
 const D=Math.max(0.35,...rows.map(r=>r.epa==null?0:Math.abs(r.epa)));
 const W=740,rh=58,top=54,H=top+rows.length*rh+16,cx=500,half=200,xOf=e=>cx+(e/D)*half;
 const maxN=Math.max(...rows.map(r=>r.n));
 const desc=code=>{if(code==='Other')return 'multiple / exotic';const b=+code[0],te=+code[1],wr=Math.max(0,5-b-te);return `${b} RB, ${te} TE, ${wr} WR`;};
 const bodyR=rows.map((r,i)=>{
  const y=top+i*rh+rh/2, e=r.epa, good=e==null?null:(inv?e<0:e>=0), col=e==null?'#9aa3b0':(good?POS:NEG), x=e==null?cx:xOf(e);
  const sel=String(OPPF.pers)===String(r.code), vw=170*(r.n/maxN), rr=4+5*Math.sqrt(r.n/maxN);
  const vlab=e==null?'—':(e>=0?'+':'')+e.toFixed(3), vx=e>=0?x+rr+6:x-rr-6, va=e>=0?'start':'end';
  const line=e==null?'':`<line x1="${cx}" y1="${y}" x2="${x.toFixed(1)}" y2="${y}" stroke="${col}" stroke-width="3.4"/>`;
  return `<g class="perscol${sel?' sel':''}" data-opers="${r.code}" style="cursor:pointer"><title>${r.n} snaps (${r.pct.toFixed(0)}%) · EPA/play ${vlab} — click to filter everything below to ${r.code==='Other'?'these groupings':r.code+' personnel'}</title>`+
   `<rect x="4" y="${(top+i*rh+3)}" width="${W-8}" height="${rh-6}" rx="8" fill="${sel?'rgba(203,180,127,.32)':'rgba(0,0,0,0)'}"/>`+
   `<text x="14" y="${y-8}" font-size="14.5" font-weight="800" fill="#1b2733">${r.code==='Other'?'Other':r.code+' Personnel'}<tspan font-size="10" font-weight="600" fill="#8a94a3"> · ${desc(r.code)}</tspan></text>`+
   `<rect x="14" y="${y+2}" width="170" height="7" rx="3.5" fill="#dfe4ea"/>`+
   `<rect x="14" y="${y+2}" width="${vw.toFixed(1)}" height="7" rx="3.5" fill="${sel?'#a8842f':'#8c96a3'}"/>`+
   `<text x="192" y="${y+9}" font-size="10.5" font-weight="800" fill="#5a6472">${r.n} snaps · ${r.pct.toFixed(0)}%</text>`+
   line+`<circle cx="${x.toFixed(1)}" cy="${y}" r="${rr.toFixed(1)}" fill="${col}"/>`+
   `<text x="${vx.toFixed(1)}" y="${y+4}" text-anchor="${va}" font-size="12.5" font-weight="800" fill="${col}">${vlab}</text>`+
   `</g>`;
 }).join('');
 const axis=`<line x1="${cx}" y1="${top-6}" x2="${cx}" y2="${H-10}" stroke="#b9c2ce" stroke-dasharray="4 4"/>`+
  `<text x="14" y="${top-24}" font-size="9.5" font-weight="800" fill="#8a94a3" letter-spacing=".5">SNAP VOLUME</text>`+

 if(!S)return null;

 for(const ab in S){

  pl.rush.forEach(p=>{const f=p[17];if(f){fk++;if(f==='U')u++;}});

 if(zoneBoot>=2)return {fam:'Wide zone + boot / play-action family',why:'high play-action and out-of-pocket rates married to under-center looks',chips};

// Route-tree / field-zone leader boards (pass). who='rec'|'qb', kind='route'|'zone'.
function renderPassSplits(who,kind){
 const rlab=who==='qb'?'Completions':'Receptions', cabbr=who==='qb'?'comp':'rec';
 const metrics=[['ec','EPA + CPOE'],['epa','EPA/tgt'],['cpoe','CPOE'],['comp',rlab],['yds','Yards'],['td','TDs']];
 const groupsN=kind==='route'?RT13:(function(){const a=[];for(let d=0;d<4;d++)for(let s=0;s<3;s++)a.push(DEPN2[d]+' · '+SIDN2[s]);return a;})();

 const unit=who==='rec'?'targets':'attempts', unitS=who==='rec'?'target':'attempt';

 const totals=passTotals(who), lgVol=starterAvgVol(totals,who==='rec'?4:1), minVol=Math.round(0.8*lgVol);
 const qual=new Set(Object.keys(totals).filter(nm=>totals[nm].n>=minVol));
 const psMin=kind==='route'?3:2, okP=x=>qual.has(x.name)&&x.tgt>=psMin;
 const G=passSplitGroups(who,keyOf);
 let sg=SPLITGROUP; if(sg!=='all'&&(+sg>=groupsN.length||+sg<0))sg='all';
 if(!metrics.some(m=>m[0]===SPLITMETRIC))SPLITMETRIC='ec';

 const controls=`<div class="card">${segRow('spm',SPLITMETRIC,metrics,null,'Metric')}${segRow('spg',sg,[['all',kind==='route'?'All routes':'All zones']].concat(groupsN.map((nm,i)=>[String(i),nm])),'margin:0 6px 6px 0;flex-wrap:wrap',kind==='route'?'Route — drill into one':'Field zone — drill into one')}<p class="note" style="margin:2px 0 0">${qNote}</p></div>`;

 let body='';
 if(sg==='all'){
  if(kind==='zone'){
   let cells='';for(let d=3;d>=0;d--){for(let s=0;s<3;s++){const r=summ[d*3+s];const ld=r.ld;const rz=ld&&(ld.rzRec||ld.rzTd||ld.rzYds)?`<div class="fzc-rz">red zone · ${ld.rzRec} ${cabbr} · ${ld.rzYds} yd · ${ld.rzTd} TD</div>`:'';cells+=`<div class="fzc cl" data-jump="${d*3+s}"><div class="fzc-h">${DEPN2[d]} · ${SIDN2[s]}</div><div class="fzc-l">${ld?teamCell(ld.team,ld.name):'<span class="fzmute">—</span>'}</div><div class="fzc-v">${ld?underPass(ld):r.tot+' '+unit}</div>${rz}</div>`;}}
   body=`<div class="card"><p class="note" style="margin:0 0 8px">Best qualified ${posLab.toLowerCase()} in each area of the field by <b>${mLab}</b>; the cell shows his actual line in that zone (${cabbr}/tgt · yds · TD) with the <b>red-zone</b> share below (snaps inside the opponent 20). Deep at top, line of scrimmage at bottom — tap a zone for its top 50.</p><div class="fzgrid">${cells}</div></div>`;
  } else {
   body=`<div class="card"><p class="note" style="margin:0 0 8px">The route tree — each route's leader by <b>${mLab}</b>, with his line on that route (${cabbr}/tgt · yds · TD). Tap a route for its top 50 ${posLab.toLowerCase()}s.</p><div class="scroll"><table><thead><tr><th class="tl">Route</th><th>${who==='rec'?'Targets':'Att'}</th><th>Lg EPA/tgt</th><th>Lg CPOE</th><th class="tl">Leader · ${mLab}</th></tr></thead><tbody>${summ.map(r=>`<tr class="cl" data-jump="${r.i}"><td class="tl">${r.nm}</td><td>${r.tot}</td><td>${r.lgE==null?'—':(r.lgE>0?'+':'')+r.lgE.toFixed(3)}</td><td>${r.lgC==null?'—':(r.lgC>0?'+':'')+r.lgC.toFixed(1)}</td><td class="tl">${r.ld?teamCell(r.ld.team,r.ld.name)+' <b>'+fmtPassMetric(r.ld.mv,SPLITMETRIC)+'</b> <span class="hint">'+underPass(r.ld)+'</span>':'—'}</td></tr>`).join('')}</tbody></table></div></div>`;
  }

  const rzCols=kind==='zone'?[{k:'rzRec',lab:'RZ '+(who==='rec'?'Rec':'Cmp'),heat:1},{k:'rzYds',lab:'RZ Yds',heat:1},{k:'rzTd',lab:'RZ TD',heat:1}]:[];
  const cols=[{k:'name',lab:posLab},{k:'team',lab:'Tm'},{k:'tgt',lab:who==='rec'?'Tgt':'Att'},{k:'rec',lab:who==='rec'?'Rec':'Cmp'},{k:'yds',lab:'Yds',heat:1},{k:'td',lab:'TD',heat:1},...rzCols,{k:'epaTgt',lab:'EPA/tgt',fmt:v=>v==null?'—':(v>0?'+':'')+v.toFixed(3),heat:1},{k:'cpoe',lab:'CPOE',fmt:v=>v==null?'—':(v>0?'+':'')+v.toFixed(1),heat:1},{k:'mv',lab:mLab,fmt:v=>fmtPassMetric(v,SPLITMETRIC),heat:1}];

 }
 return controls+body;
}
// Point-of-attack leader board (run). gap×direction.

  box.innerHTML=`<div class="card">${barChart(R.map(t=>({lab:t.abbr,ab:t.abbr,v:t.stEpa==null?0:+t.stEpa.toFixed(3),hl:t.abbr=='NO',title:t.name+' — ST EPA/play '+ef(t.stEpa)+' · FG '+t.fgM+'/'+t.fgA+' ('+t.fgPct+'%)'})),{avg:0,label:'Special-teams EPA per play — every ST snap (FG/XP, kickoff coverage & return, punt & punt return) — best → worst',dec:2})}</div>`+
  `<div class="card">${tbl(R,[{k:'name',lab:'Team'},{k:'stEpa',lab:'ST EPA/play',fmt:ef,heat:1},{k:'fgM',lab:'FG made',heat:1},{k:'fgPct',lab:'FG%',fmt:v=>v==null?'—':v.toFixed(1)+'%',heat:1},{k:'fgEpa',lab:'FG EPA',fmt:ef,heat:1},{k:'koEpa',lab:'Kickoff EPA',fmt:ef,heat:1},{k:'krEpa',lab:'Kick ret EPA',fmt:ef,heat:1},{k:'prEpa',lab:'Punt ret EPA',fmt:ef,heat:1},{k:'puntEpa',lab:'Punt EPA',fmt:ef,heat:1},{k:'driveStart',lab:'Avg drive start',fmt:v=>v==null?'—':'own '+v.toFixed(1),heat:1},{k:'driveStartAllowed',lab:'Drive start allowed',fmt:v=>v==null?'—':'own '+v.toFixed(1)}],'abbr',true)}<p class="note"><b>Sorted by ST EPA/play</b> — each team's net expected-points contribution across every special-teams snap, all from that team's own perspective (higher = better). The unit splits are per-play EPA: <b>FG EPA</b> (place-kicking), <b>Kickoff EPA</b> (kicking/coverage leg), <b>Kick ret</b> &amp; <b>Punt ret EPA</b> (return units), <b>Punt EPA</b> (net punting). <b>FG made</b> and <b>FG%</b> are season totals. <b>Avg drive start</b> = your offense's mean starting field position (own yard line; higher = better); <b>Drive start allowed</b> = the opponent's (lower = better) — both are downstream of return/coverage play. Cells shade vs league average. <b>DVOA is a proprietary FTN / Football Outsiders metric and is not in the free nflverse data</b>, so EPA/play is used as the headline efficiency measure instead.</p></div>`;
 }
 else if(id=='specialist'){
  const S=window.SPECIALTEAMS;
  if(!S){box.innerHTML='<div class="card banner">Special-teams data not loaded — needs data/specialteams.js.</div>';return;}
  const ef=v=>v==null?'—':(v>0?'+':'')+v.toFixed(3), n1=v=>v==null?'—':v.toFixed(1);
  const CFG={
   place:{pool:S.players.place,qual:x=>x.fga>=10,unit:'kick',
     cols:[{k:'name',lab:'Kicker'},{k:'team',lab:'Tm'},{k:'fgm',lab:'FGM',heat:1},{k:'fga',lab:'FGA'},{k:'fgPct',lab:'FG%',fmt:v=>v==null?'—':v.toFixed(1)+'%',heat:1},{k:'long',lab:'Long',heat:1},{k:'xpm',lab:'XPM'},{k:'xpa',lab:'XPA'},{k:'epa',lab:'EPA/kick',fmt:ef,heat:1}],
     note:'Field-goal &amp; extra-point kickers. <b>EPA/kick</b> is from the kicking team\'s perspective — a make from distance is worth more than a chip shot, and a miss is penalized by where it left the opponent. Min 10 FG attempts.'},
   kickoff:{pool:S.players.kickoff,qual:x=>x.n>=20,unit:'kick',
     cols:[{k:'name',lab:'Kicker'},{k:'team',lab:'Tm'},{k:'n',lab:'Kickoffs'},{k:'dist',lab:'Avg dist',fmt:n1,heat:1},{k:'epa',lab:'EPA/kick',fmt:ef,heat:1}],
     note:'Kickoff leg &amp; placement (coverage-unit value). <b>EPA/kick</b> from the kicking team\'s perspective — higher = pins returners deeper / more touchbacks under the dynamic-kickoff rules. Min 20 kickoffs.'},
   punt:{pool:S.players.punt,qual:x=>x.n>=15,unit:'punt',
     cols:[{k:'name',lab:'Punter'},{k:'team',lab:'Tm'},{k:'n',lab:'Punts'},{k:'gross',lab:'Gross avg',fmt:n1,heat:1},{k:'in20',lab:'Inside 20',heat:1},{k:'epa',lab:'EPA/punt',fmt:ef,heat:1}],
     note:'Punters. <b>EPA/punt</b> from the punting team\'s perspective (net field-position swing, so a boomer downed inside the 20 rates well and a shank/return hurts). <b>Gross avg</b> = raw punt distance. Min 15 punts.'},
   kret:{pool:S.players.kret,qual:x=>x.n>=8,unit:'ret',
     cols:[{k:'name',lab:'Returner'},{k:'team',lab:'Tm'},{k:'n',lab:'Returns'},{k:'avg',lab:'Avg yds',fmt:n1,heat:1},{k:'epa',lab:'EPA/ret',fmt:ef,heat:1}],
     note:'Kickoff returners. <b>EPA/return</b> from the returning team\'s perspective (field position gained vs. the expected touchback spot). Min 8 returns.'},
   pret:{pool:S.players.pret,qual:x=>x.n>=8,unit:'ret',
     cols:[{k:'name',lab:'Returner'},{k:'team',lab:'Tm'},{k:'n',lab:'Returns'},{k:'avg',lab:'Avg yds',fmt:n1,heat:1},{k:'epa',lab:'EPA/ret',fmt:ef,heat:1}],
     note:'Punt returners. <b>EPA/return</b> from the returning team\'s perspective (field position gained, fair catches count as 0-yard returns). Min 8 returns.'}
  };
  const order=[['place','Place kickers'],['kickoff','Kickoffs'],['punt','Punters'],['kret','Kick returners'],['pret','Punt returners']];
  if(!CFG[STGRP])STGRP='place';
  const seg=`<div class="subnav" style="margin:0">${order.map(([v,l])=>`<button data-stgrp="${v}" class="${STGRP===v?'on':''}">${l}</button>`).join('')}</div>`;
  const c=CFG[STGRP];
  const pool=(c.pool||[]).filter(c.qual).sort((a,b)=>(b.epa==null?-99:b.epa)-(a.epa==null?-99:a.epa));
  const uLab=c.unit==='ret'?'EPA/return':(c.unit==='punt'?'EPA/punt':'EPA/kick');
  const bars=pool.slice(0,30).map(x=>({lab:x.name,v:x.epa==null?0:+x.epa.toFixed(3),hl:x.team=='NO',title:x.name+' ('+x.team+') — '+uLab+' '+ef(x.epa)}));
  const bAvg=pool.length?pool.reduce((s,x)=>s+(x.epa||0),0)/pool.length:0;
  box.innerHTML=`<div class="card"><div class="subgroup" style="margin:0"><span class="subcap">Specialist</span>${seg}</div><p class="note" style="margin:6px 0 0">${c.note} <b>Sorted by ${uLab}</b> (higher = better).</p></div>`+
   `<div class="card">${barChart(bars,{avg:bAvg,label:'Top '+Math.min(30,pool.length)+' by '+uLab,dec:2,rot:1,b:60,h:280,bw:16})}</div>`+
   `<div class="card">${tbl(pool,c.cols,'team',true)}<p class="note">${pool.length} qualifiers. Names are the nflverse short form (first-initial.last). Team logo marks the player's team. Cells shade vs. the qualifiers' average.</p></div>`;
  box.querySelectorAll('[data-stgrp]').forEach(b=>b.onclick=()=>{STGRP=b.dataset.stgrp;drawEPA('specialist');});
 }
 else if(id=='passid'){const PM={};L.proe.forEach(x=>PM[x.abbr]=x);const R=L.neutral.map(x=>({...x,proe:PM[x.abbr]?PM[x.abbr].proe:null,cpoe:PM[x.abbr]?PM[x.abbr].cpoe:null})).sort((a,b)=>b.neutralPass-a.neutralPass);const e=mm(R,'neutralPass'),e2=mm(R,'proe');box.innerHTML=`<div class="card">${tbl(R,[{k:'name',lab:'Team'},{k:'neutralPass',lab:'Neutral pass %',heat:e},{k:'overallPass',lab:'Overall pass %'},{k:'proe',lab:'PROE',heat:e2},{k:'cpoe',lab:'CPOE'}],'abbr')}<p class="note">One pass-identity view: <b>Neutral pass %</b> (1st/2nd down, win prob 20–80%, outside the final 2:00 — the cleanest pass-vs-run identity), overall pass %, <b>PROE</b> (pass rate over expected; + = passes more than the situation dictates) and CPOE (completion % over expected).</p></div>`;}
 else if(id=='fourth'){const R=[...L.fourth].sort((a,b)=>(b.goRate||0)-(a.goRate||0));const e=mm(R,'goRate');box.innerHTML=`<div class="card">${tbl(R,[{k:'name',lab:'Team'},{k:'dec',lab:'4th-down decisions'},{k:'go',lab:'Go-for-it'},{k:'goRate',lab:'Go rate %',heat:e},{k:'conv',lab:'Conversions'},{k:'convRate',lab:'Convert %'}],'abbr')}<p class="note">Descriptive 4th-down aggressiveness (go rate among go/punt/FG decisions) and conversion rate — not a model-based decision grade.</p></div>`;}
 else if(id=='luck'){const R=L.luck.map(x=>({...x,osrec:x.osW+'-'+x.osL}));box.innerHTML=`<div class="card">${tbl(R,[{k:'name',lab:'Team'},{k:'osrec',lab:'1-score record'},{k:'fumRec',lab:'Fumble recovery %'},{k:'toMargin',lab:'TO margin / game'}],'abbr')}<p class="note">Luck indicators (approximation of rbsdm's view): one-score game record (≤8 pts), fumble-recovery rate (≈50% neutral), turnover margin per game.</p></div>`;}
 else if(id=='series'){const R=[...L.series].sort((a,b)=>b.off-a.off);const e=mm(R,'off');box.innerHTML=`<div class="card">${tbl(R,[{k:'name',lab:'Team'},{k:'off',lab:'Off series success %',heat:e},{k:'deff',lab:'Def series success % allowed'}],'abbr')}<p class="note">Series success = % of down series ending in a first down or TD. Offense higher = better; defense lower = better.</p></div>`;}
}
renderRatings();renderEPA();renderOpponents();renderField();renderPhil();renderOverview();
// ---------- SORTABLE TABLES + DYNAMIC RANK ----------
function srtVal(td){const t=td.textContent.trim();if(t===''||t==='—')return null;const x=parseFloat(t.replace(/[%↑↓+]/g,''));return isNaN(x)?t.toLowerCase():x;}
function renumberTable(table){if(table.dataset.ranked!=='1')return;let i=1;[...table.tBodies[0].rows].forEach(r=>{r.cells[0].textContent=r.classList.contains('lg')?'':i++;});}
function addRankCol(table){
 if(table.dataset.ranked)return;
 const tb=table.tBodies[0],hrow=table.tHead&&table.tHead.rows[0];
 if(!tb||!hrow){if(table.dataset)table.dataset.ranked='0';return;}
 const dataRows=[...tb.rows].filter(r=>!r.classList.contains('lg'));
 const k=hrow.cells[0].textContent.trim().toLowerCase();
 const entity=k==='#'||k.startsWith('team')||k.startsWith('opponent')||k.startsWith('quarterback')||k.startsWith('route')||k.startsWith('coverage')||k.startsWith('personnel');
 if(dataRows.length<6||!entity){table.dataset.ranked='0';return;}
 if(k==='#'){table.dataset.ranked='1';renumberTable(table);return;}
 const th=document.createElement('th');th.textContent='#';th.dataset.rk='1';hrow.insertBefore(th,hrow.cells[0]);
 [...tb.rows].forEach(r=>{const td=r.insertCell(0);td.className='rkc';});
 table.dataset.ranked='1';renumberTable(table);
}
function scanTables(){document.querySelectorAll('main table:not([data-ranked])').forEach(t=>{try{addRankCol(t)}catch(_){}});}
const rkObs=new MutationObserver(()=>{rkObs.disconnect();scanTables();rkObs.observe(document.querySelector('main'),{childList:true,subtree:true});});
rkObs.observe(document.querySelector('main'),{childList:true,subtree:true});
document.addEventListener('click',e=>{
 const th=e.target.closest('th');if(!th)return;
 const table=th.closest('table');if(!table||!table.tBodies.length||!table.tHead)return;
 if(table.tHead.rows.length>1)return;
 const ci=[...th.parentNode.children].indexOf(th);
 if(table.dataset.ranked==='1'&&ci===0)return;
 const tb=table.tBodies[0];const all=[...tb.rows];
 const pin=all.filter(r=>r.classList.contains('lg'));
 const rows=all.filter(r=>!r.classList.contains('lg'));
 if(rows.length<3)return;
 let dir;
 if(table.dataset.sc===String(ci)){dir=table.dataset.sd==='1'?-1:1;}
 else{const sample=rows.map(r=>r.cells[ci]&&srtVal(r.cells[ci])).filter(v=>v!=null);dir=(sample.length&&typeof sample[0]==='number')?-1:1;}
 table.dataset.sc=String(ci);table.dataset.sd=dir===1?'1':'-1';
 rows.sort((a,b)=>{const va=a.cells[ci]?srtVal(a.cells[ci]):null,vb=b.cells[ci]?srtVal(b.cells[ci]):null;
  if(va==null&&vb==null)return 0;if(va==null)return 1;if(vb==null)return -1;
  if(typeof va==='number'&&typeof vb==='number')return dir===-1?vb-va:va-vb;
  return dir*String(va).localeCompare(String(vb));});
 pin.forEach(r=>tb.appendChild(r));rows.forEach(r=>tb.appendChild(r));
 renumberTable(table);
});
scanTables();

// ---------- back to top ----------
const totop=document.createElement('button');totop.id='totop';totop.title='Back to top (nav & filters)';totop.textContent='↑';
totop.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});document.body.appendChild(totop);
window.addEventListener('scroll',()=>totop.classList.toggle('show',window.scrollY>700),{passive:true});
</script></body></html>
