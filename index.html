<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Saints NFL Scouting Dashboard — 2025/26</title>
<style>
:root{
 --navy:#0e1830;--navy2:#1f3a63;--navy3:#2c4d80;
 --gold:#d4bd8a;--gold-deep:#b6975a;--gold-soft:#f3ebda;
 --ink:#15233f;--text:#28323f;--muted:#64748b;--faint:#94a3b8;
 --line:#e7ebf2;--line2:#eff2f8;--bg:#eef2f8;--card:#ffffff;
 --blue:#2e5496;--good:#1e7a34;--good-bg:#e7f3ea;--bad:#b23b3b;--bad-bg:#fbeaea;--warn:#b07d12;
 --r-sm:6px;--r:10px;--r-lg:14px;
 --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:32px;
 --sh-1:0 1px 2px rgba(16,26,51,.04);--sh-2:0 2px 8px rgba(16,26,51,.06);--sh-3:0 8px 24px rgba(16,26,51,.10);
 --font:"Inter","Segoe UI",-apple-system,Roboto,Helvetica,Arial,sans-serif;
 --mono:"SF Mono",ui-monospace,"Cascadia Mono","Segoe UI Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--font);color:var(--text);background:var(--bg);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;font-feature-settings:"tnum" 1,"cv05" 1}
::selection{background:var(--gold);color:var(--navy)}
/* ---------- header ---------- */
header{background:radial-gradient(120% 140% at 0% 0%,var(--navy2),var(--navy) 70%);color:#fff;padding:18px 22px 16px;border-bottom:2px solid var(--gold)}
header h1{margin:0;font-size:21px;font-weight:800;letter-spacing:-.2px;display:flex;align-items:center;gap:8px}
header h1 .g{color:var(--gold)}
header .sub{font-size:12px;opacity:.78;margin-top:4px;font-weight:500;letter-spacing:.1px}
/* ---------- nav ---------- */
nav{display:flex;flex-wrap:wrap;gap:5px;padding:9px 16px;background:var(--navy);position:sticky;top:0;z-index:30;box-shadow:var(--sh-2)}
nav button{position:relative;background:transparent;color:#c4d0e4;border:1px solid transparent;padding:7px 13px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;transition:background .15s,color .15s,transform .1s}
nav button:hover{background:rgba(255,255,255,.10);color:#fff}
nav button:active{transform:translateY(1px)}
nav button.on{background:var(--gold);color:var(--navy);border-color:var(--gold);box-shadow:0 2px 8px rgba(212,189,138,.3)}
/* ---------- layout ---------- */
main{max-width:1200px;margin:0 auto;padding:22px 18px 72px}
section{display:none}
section.on{display:block;animation:fade .28s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
h2{font-size:20px;font-weight:800;color:var(--ink);margin:4px 0 3px;letter-spacing:-.3px}
.lead{color:var(--muted);font-size:13px;margin:0 0 18px;max-width:78ch;line-height:1.5}
/* ---------- cards ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 20px;margin-bottom:18px;box-shadow:var(--sh-1)}
.card:hover{box-shadow:var(--sh-2)}
/* ---------- tables ---------- */
table{border-collapse:collapse;width:100%;font-size:12.5px}
th,td{padding:7px 10px;border:none;border-bottom:1px solid var(--line2);text-align:center;white-space:nowrap}
thead th{background:var(--navy2);color:#eaf0fa;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;position:relative;padding-right:18px;user-select:none}
thead th:first-child{border-top-left-radius:var(--r-sm)}
thead th:last-child{border-top-right-radius:var(--r-sm)}
thead th::after{content:"⇅";position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9px;opacity:.32}
thead th:hover{background:var(--navy3)}
thead th:hover::after{opacity:.9}
thead th.tl{padding-right:18px}
td.tl,th.tl{text-align:left}
tbody tr{transition:background .12s}
tbody tr:nth-child(even) td{background:#fafbfd}
tbody tr:hover td{background:#eef3fa}
tbody tr:hover td:first-child{box-shadow:inset 3px 0 0 var(--gold)}
tbody td{color:var(--text)}
tr.no td{background:var(--gold-soft) !important;font-weight:700;color:var(--ink)}
tr.no td:first-child{box-shadow:inset 3px 0 0 var(--gold-deep)}
tr.lg td{background:#fbf6e8 !important;font-weight:700;color:#6a6450}
.scroll{overflow-x:auto;border-radius:var(--r-sm)}
.scroll::-webkit-scrollbar{height:9px}
.scroll::-webkit-scrollbar-thumb{background:#cdd6e4;border-radius:9px}
.scroll::-webkit-scrollbar-track{background:transparent}
/* ---------- sub-navigation (segmented) ---------- */
.subnav{display:inline-flex;gap:3px;flex-wrap:wrap;margin:0 0 16px;padding:3px;background:#e7ecf4;border-radius:10px}
.subnav button{background:transparent;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:600;font-size:12.5px;color:#5a6675;transition:background .15s,color .15s,box-shadow .15s}
.subnav button:hover{color:var(--navy2)}
.subnav button.on{background:#fff;color:var(--navy2);box-shadow:var(--sh-1)}
.subnav select{margin:0}
/* ---------- chips, pills, badges ---------- */
.tier{display:inline-block;padding:2px 10px;border-radius:11px;font-size:11px;font-weight:700;color:#fff;letter-spacing:.2px}
.bar{height:9px;border-radius:5px;background:var(--gold)}
.barwrap{background:#eef1f6;border-radius:5px;width:70px;display:inline-block;vertical-align:middle;overflow:hidden}
.wts{display:flex;gap:22px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.wts label{font-size:12px;font-weight:600;color:var(--text);display:flex;flex-direction:column;gap:4px}
.wts input{width:160px;accent-color:var(--navy2)}
.pill{display:inline-flex;align-items:center;gap:4px;background:#f1f5fb;border:1px solid var(--line);border-radius:999px;padding:3px 11px;font-size:11.5px;margin:2px 4px 2px 0;color:var(--text)}
.note{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.5}
.banner{background:linear-gradient(0deg,#fdeee9,#fcf3ef);border:1px solid #f1c4b4;border-left:3px solid #d9794f;color:#8a3417;padding:9px 12px;border-radius:var(--r-sm);font-size:12.5px;margin:10px 0;font-weight:500}
.staff{font-size:13px;color:var(--muted);margin:3px 0 6px;font-weight:500}
.oppbtns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.oppbtns button{background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 12px;cursor:pointer;font-weight:700;font-size:12px;color:var(--text);transition:border-color .15s,background .15s,transform .1s,box-shadow .15s}
.oppbtns button:hover{border-color:var(--gold);box-shadow:var(--sh-1);transform:translateY(-1px)}
.oppbtns button.on{background:var(--gold);border-color:var(--gold);color:var(--navy);box-shadow:0 2px 8px rgba(212,189,138,.35)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:780px){.grid2{grid-template-columns:1fr}}
.sechead{font-weight:700;color:#fff;background:var(--navy2);padding:7px 12px;border-radius:8px;margin:18px 0 10px;font-size:12.5px;letter-spacing:.2px;display:flex;align-items:center;gap:6px}
.sechead.o{background:linear-gradient(90deg,#2e5496,#3a63a8)}
.sechead.d{background:linear-gradient(90deg,#375623,#48702f)}
small.src{color:rgba(255,255,255,.7);font-weight:500}
.sechead small.src{color:rgba(255,255,255,.72)}
select{padding:7px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:var(--text);cursor:pointer}
select:hover{border-color:var(--navy3)}
/* ---------- section intro band ---------- */
.intro{display:flex;align-items:flex-start;gap:10px;background:linear-gradient(90deg,var(--gold-soft),transparent);border-left:3px solid var(--gold);padding:8px 12px;border-radius:0 var(--r-sm) var(--r-sm) 0;margin:0 0 16px;font-size:12.5px;color:var(--text);line-height:1.5}
.kicker{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--gold-deep);margin-bottom:2px}
/* ---------- interactivity hint ---------- */
.hint{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--muted);background:#eef2f8;border:1px dashed #c5cfde;border-radius:999px;padding:2px 9px}
.hint::before{content:"☰";font-size:10px;opacity:.7}
.hintrow{display:flex;gap:6px;flex-wrap:wrap;margin:-8px 0 18px}
.pagehead{margin-bottom:2px}
/* ---------- data-viz primitives ---------- */
.hbar{position:relative;height:8px;border-radius:999px;background:#e9edf4;overflow:hidden;width:100%}
.hbar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--navy3),var(--navy2))}
.hbar.gold>i{background:linear-gradient(90deg,var(--gold),var(--gold-deep))}
.statline{display:flex;justify-content:space-between;align-items:baseline;gap:8px;font-size:11.5px;color:var(--muted);margin:3px 0}
.statline b{color:var(--ink);font-size:13px}
.delta-up{color:var(--good);font-weight:700}
.delta-dn{color:var(--bad);font-weight:700}
.delta-0{color:var(--faint);font-weight:600}
/* ---------- matchup (dumbbell) bars ---------- */
.mbars{margin-top:6px}
.mbhdr{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;margin:2px 0 8px}
.mbhdr .mbscale{font-size:8.5px;color:var(--faint);font-weight:700;white-space:nowrap}
.mbrow{display:grid;grid-template-columns:92px 1fr 50px;align-items:center;gap:9px;margin:6px 0}
.mblab{font-size:11px;color:var(--text);font-weight:600;text-align:right;line-height:1.15}
.mbtrack{position:relative;height:22px;background:linear-gradient(90deg,#e9f1ea,#f3f5f9 55%,#f8efef);border:1px solid var(--line);border-radius:7px}
.mbline{position:absolute;top:50%;height:4px;transform:translateY(-50%);border-radius:3px;opacity:.65}
.mbdot{position:absolute;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;color:#fff;box-shadow:0 1px 3px rgba(16,26,51,.3);border:1.5px solid #fff;z-index:2}
.mbdot.a{background:var(--navy2)}
.mbdot.b{background:var(--gold-deep);z-index:3}
.mbedge{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.2px;text-align:center;border-radius:6px;padding:3px 2px;line-height:1.1}
.mbedge.opp{color:#9b1c1c;background:#fbeaea}
.mbedge.sai{color:#7a5e1e;background:var(--gold-soft)}
.mbedge.even{color:var(--faint);background:#f1f3f7}
.mbk{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle;margin:0 2px 0 6px;border:1px solid #fff;box-shadow:0 0 0 1px var(--line)}
.mbk.a{background:var(--navy2)}.mbk.b{background:var(--gold-deep)}
.tblfb{margin-top:8px}
.tblfb summary{font-size:11px;color:var(--blue);font-weight:700;cursor:pointer;list-style:none;display:inline-flex;align-items:center;gap:5px}
.tblfb summary::before{content:"▸";font-size:9px;transition:transform .15s}
.tblfb[open] summary::before{transform:rotate(90deg)}
.tblfb[open] summary{margin-bottom:8px}
/* ---------- interactive field charts ---------- */
.fieldwrap{display:grid;grid-template-columns:minmax(0,360px) 1fr;gap:18px;align-items:start}
@media(max-width:760px){.fieldwrap{grid-template-columns:1fr}}
.fctrls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:0 0 12px}
.fctrls .fc-group{display:flex;flex-direction:column;gap:3px}
.fctrls label{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.fctrls select{min-height:38px;min-width:120px}
.fsvgwrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1);padding:8px}
.ffield{width:100%;height:auto;display:block;touch-action:manipulation}
.fdot{cursor:pointer;transition:r .1s}
.fdot.sel{stroke:#111;stroke-width:2.2}
.flegend{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 2px}
.lgchip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--text);background:#f1f5fb;border:1px solid var(--line);border-radius:999px;padding:4px 10px;cursor:pointer;user-select:none;min-height:30px}
.lgchip.off{opacity:.38;text-decoration:line-through}
.lgdot{width:11px;height:11px;border-radius:50%;display:inline-block}
.fdetail{margin-top:10px;background:#f8fafd;border:1px solid var(--line);border-left:3px solid var(--navy2);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:9px 12px;font-size:12px;min-height:30px;color:var(--text)}
.fdetail .big{font-weight:800;color:var(--ink);font-size:13px}
.fdetail .muted{color:var(--muted)}
.fagg{min-width:0}
.fstatrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
@media(max-width:420px){.fstatrow{grid-template-columns:repeat(2,1fr)}}
.fstat{background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 10px;text-align:center;box-shadow:var(--sh-1)}
.fstat .v{font-size:18px;font-weight:800;color:var(--ink);line-height:1.1}
.fstat .l{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);margin-top:2px}
.fzrow{display:grid;grid-template-columns:74px 1fr 48px;align-items:center;gap:8px;margin:5px 0;font-size:11.5px}
.fzrow .zl{font-weight:700;color:var(--text);text-align:right;font-size:10.5px}
.fzrow .zb{position:relative;height:18px;background:#eef2f8;border-radius:5px;overflow:hidden}
.fzrow .zb>i{position:absolute;top:0;bottom:0;border-radius:5px}
.fzrow .zv{font-weight:800;text-align:left;font-size:11px}
.frecs{width:100%;font-size:11.5px;border-collapse:collapse}
.frecs th,.frecs td{padding:5px 7px;border-bottom:1px solid var(--line2);text-align:right;white-space:nowrap}
.frecs th{background:var(--navy2);color:#eaf0fa;font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;cursor:default;position:static}
.frecs td:first-child,.frecs th:first-child{text-align:left}
.frecs tbody tr{cursor:pointer}
.frecs tbody tr.sel td{background:var(--gold-soft);font-weight:700}
.fsub{font-size:12.5px;font-weight:700;color:var(--navy2);margin:14px 0 6px;display:flex;align-items:center;gap:6px}
.floading{padding:30px;text-align:center;color:var(--muted);font-size:13px}
/* ---------- self-scout: drive-sequencing bars + zone field ---------- */
.seqbars{margin-top:6px}
.seqrow{display:grid;grid-template-columns:1fr 130px 44px;align-items:center;gap:10px;margin:7px 0;font-size:11.5px}
.seql{color:var(--text);font-weight:600}
.seqtrack{height:14px;background:#eef2f8;border-radius:7px;overflow:hidden}
.seqtrack>i{display:block;height:100%;background:linear-gradient(90deg,var(--navy3),var(--navy2));border-radius:7px}
.seqv{font-weight:800;text-align:right;color:var(--navy2)}
@media(max-width:520px){.seqrow{grid-template-columns:1fr 84px 38px}}
.zfield{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-1);background:#eef4ee;max-width:560px}
.zfe{background:#16284a;color:#d4bd8a;text-align:center;font-size:10px;font-weight:800;letter-spacing:1.2px;padding:5px 4px}
.zfe.b{background:#39404d;color:#cdd3de}
.zband{display:grid;grid-template-columns:118px 1fr 66px;align-items:center;gap:12px;padding:9px 12px;border-bottom:1px solid #d7e2d7;border-left:5px solid var(--line)}
.zband:nth-child(even){background:#e7f0e7}
.zband .zn{font-weight:800;font-size:12.5px;color:#15233f}
.zband .zsub{font-size:9.5px;color:#5a6675;font-weight:600;margin-top:1px}
.zbar2{height:10px;border-radius:5px;overflow:hidden;display:flex;margin:4px 0 2px;background:#fff}
.zbar2 .p{background:#2e5496}.zbar2 .r{background:#d4bd8a}
.zband .zstat{text-align:right}
.zband .zstat .e{font-weight:800;font-size:16px;line-height:1}
.zband .zstat .el{font-size:8.5px;color:#5a6675;font-weight:700;text-transform:uppercase;letter-spacing:.2px}
@media(max-width:520px){.zband{grid-template-columns:84px 1fr 50px;gap:8px;padding:8px 9px}}
.bigcta{display:inline-flex;align-items:center;gap:6px;background:var(--gold);color:var(--navy);border:none;border-radius:9px;padding:11px 17px;font-weight:800;font-size:13px;cursor:pointer;margin-top:12px;box-shadow:var(--sh-1)}
.bigcta:hover{box-shadow:var(--sh-2);transform:translateY(-1px)}
/* ---------- tendency tracker (team mode) ---------- */
.trkfilters{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;margin-bottom:16px}
.trkfilters .fc-group{display:flex;flex-direction:column;gap:4px}
.trkfilters label{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.trkseg{display:inline-flex;gap:2px;padding:3px;background:#e7ecf4;border-radius:9px}
.trkseg button{background:transparent;border:none;padding:6px 11px;border-radius:7px;cursor:pointer;font-weight:700;font-size:11.5px;color:#5a6675;min-height:34px}
.trkseg button:hover{color:var(--navy2)}
.trkseg button.on{background:#fff;color:var(--navy2);box-shadow:var(--sh-1)}
.relrow{display:grid;grid-template-columns:120px 1fr 78px;align-items:center;gap:10px;margin:8px 0;font-size:11.5px}
.rellab{font-weight:600;color:var(--text);text-align:right;font-size:11px;line-height:1.1}
.reltrack{position:relative;height:16px;background:linear-gradient(90deg,#e8efe8,#e3e9f1 50%,#f6ece9);border-radius:8px;border:1px solid var(--line)}
.relmk{position:absolute;top:-2px;width:5px;height:20px;border-radius:2px;transform:translateX(-50%);box-shadow:0 1px 2px rgba(0,0,0,.22)}
.relval{text-align:left;font-weight:800;font-size:12px;white-space:nowrap}
.relrk{font-size:9.5px;color:var(--muted);font-weight:700}
@media(max-width:520px){.relrow{grid-template-columns:84px 1fr 66px;gap:7px}}
.persrow{display:grid;grid-template-columns:48px 1fr 54px 56px;align-items:center;gap:8px;margin:6px 0;font-size:11.5px}
.persrow .pn{font-weight:800;color:var(--ink)}
.persrow .pb{height:13px;background:#eef2f8;border-radius:6px;overflow:hidden}
.persrow .pb>i{display:block;height:100%;background:linear-gradient(90deg,var(--navy3),var(--navy2));border-radius:6px}
.mzsplit{display:flex;height:26px;border-radius:7px;overflow:hidden;border:1px solid var(--line);margin:5px 0 4px}
.mzsplit>div{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;min-width:0}
.mzsplit .m{background:linear-gradient(90deg,#b07d2e,#caa24a)}
.mzsplit .z{background:linear-gradient(90deg,#2e5496,#3a63a8)}
.mstrip{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;background:#f8fafd;border:1px solid var(--line);border-radius:9px;padding:10px 14px;margin:10px 0}
.mttl{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.mbig{font-size:18px;font-weight:800;color:var(--navy2)}
.msub{font-size:11.5px;color:#6b7280}
.medge{text-align:center}
.edge{display:inline-block;color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:11px;white-space:nowrap}
.rk{font-size:10.5px;font-weight:700}
.dv{font-size:10px;color:#445;margin-left:4px}
.keys{margin:4px 0 4px;padding-left:18px}
.keys li{margin:6px 0;font-size:12.5px;line-height:1.5;white-space:normal}
.idrow{margin:8px 0 4px}
.fz{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
@media(max-width:900px){.fz{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.fz{grid-template-columns:1fr}}
.fzz{background:linear-gradient(180deg,#f4f9f4,#ecf3ec);border:1px solid #cfdccf;border-radius:8px;padding:8px 9px;min-width:0}
.fzh{font-weight:800;font-size:12px;color:#1f3864}
.fzy{font-size:10px;color:#6b7280;margin-bottom:2px}
.fzbar{display:flex;height:12px;border-radius:4px;overflow:hidden;margin:6px 0 3px;background:#eee}
.fzbar .p{background:#2e5496}.fzbar .r{background:#D3BC8D}
.fzm{font-size:11px;margin:2.5px 0;color:#333}
.fzd{font-size:9.5px;font-weight:700;margin-left:3px}

.fzrun{display:flex;gap:6px;align-items:flex-end}

 if(fams.length>1){const s=[...fams].sort((x,y)=>inv?x[1][2]-y[1][2]:y[1][2]-x[1][2]);best=s[0][0];worst=s[s.length-1][0];}

  const tint=key===best?'background:rgba(30,122,52,.08)':key===worst?'background:rgba(162,59,59,.08)':'';

function routeTable(ab,side,lev){

  <div class="subnav" id="fmode">${modes.map(([id,l])=>`<button data-fm="${id}" class="${id===FIELDMODE?'on':''}">${l}</button>`).join('')}</div>
  <div class="oppbtns" id="fzteams"></div>
  <div id="fieldbody"></div>`;
 const teams=[{abbr:'NO',name:'New Orleans Saints'},...DATA.opponents];
 const tb=$('#fzteams');
 teams.forEach(t=>{const b=document.createElement('button');b.textContent=t.abbr;b.title=t.name;if(t.abbr===curFZTeam)b.classList.add('on');b.onclick=()=>{curFZTeam=t.abbr;FFILT.qb='ALL';FFILT.rec='ALL';FFILT.run='ALL';FFILT.sel=null;document.querySelectorAll('#fzteams button').forEach(x=>x.classList.remove('on'));b.classList.add('on');drawFieldPage();};tb.appendChild(b);});
 $('#fmode').querySelectorAll('[data-fm]').forEach(b=>b.onclick=()=>{FIELDMODE=b.dataset.fm;FFILT.sel=null;document.querySelectorAll('#fmode button').forEach(x=>x.classList.remove('on'));b.classList.add('on');drawFieldPage();});

function loadTeam(ab){
 if(PLAYCACHE[ab])return Promise.resolve(PLAYCACHE[ab]);
 if(window.PLAYS&&window.PLAYS[ab]){PLAYCACHE[ab]=window.PLAYS[ab];return Promise.resolve(PLAYCACHE[ab]);}
 return fetch('data/plays/'+ab+'.json').then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(d=>{PLAYCACHE[ab]=d;return d;});
}
function drawFieldPage(){
 const body=$('#fieldbody');if(!body)return;
 if(FIELDMODE==='sheet'){body.innerHTML='<div class="card" id="fzpage"></div>';drawFZPage();return;}
 body.innerHTML='<div class="card floading">Loading 2025 plays…</div>';
 loadTeam(curFZTeam).then(d=>{if($('#fieldbody')&&FIELDMODE!=='sheet'){CURPLAYS=d;renderFieldChart();}})
   .catch(e=>{const b=$('#fieldbody');if(b)b.innerHTML=`<div class="card banner">Couldn't load play data for ${curFZTeam}: ${e.message}. (The field charts need the dashboard served over http — they're loading data/plays/${curFZTeam}.json.)</div>`;});
}
function drawFZPage(){
 const box=$('#fzpage');const st=FZSTATE.opp;
 const o=curFZTeam==='NO'?null:DATA.opponents.find(x=>x.abbr===curFZTeam);
 const name=o?o.name:'New Orleans Saints';
 const ab=o?(st.side==='off'?(o.src||o.abbr):o.abbr):'NO';
 const proxy=o&&st.side==='off'&&o.proxy?` · ⚠ offense proxied: 2025 ${o.srcName}`:'';

// ---------- INTERACTIVE FIELD CHARTS (pass / run) ----------
const FGEO={W:100,top:14,bot:214,perYd:2};
const ZB=[['RED ZONE',0,20],['GREEN',20,40],['MIDFIELD',40,60],['OWN TERRITORY',60,90],['BACKED UP',90,100]];
const ZN=['Red','Green','Midfield','Own','Backed Up'];
const OUT={C:{c:'#1e7a34',lab:'Complete'},I:{c:'#aab2bf',lab:'Incomplete'},N:{c:'#b23b3b',lab:'Intercepted'}};
const DIRN=['left','middle','right'],GAPN=['guard','tackle','end'];
let CUR_SEL=[];
const fmean=a=>{const v=a.filter(x=>x!=null);return v.length?v.reduce((s,x)=>s+x,0)/v.length:null;};
const zoneOf=yl=>yl>=90?'Backed Up':yl>=60?'Own':yl>=41?'Midfield':yl>=21?'Green':'Red';
const ypos=p=>FGEO.top+Math.max(-6,Math.min(100,p))*FGEO.perYd;
function laneX(loc,i){const base=loc===0?26:loc===2?74:50;const jit=(((i*37+((loc==null?1:loc+1)*13))%19)-9);return Math.max(12,Math.min(88,base+jit));}
function fieldDesc(yl){if(yl==null)return '';return yl<=50?('opp '+yl):('own '+(100-yl));}
function epaColor(e){if(e==null)return '#c2c8d2';const m=Math.min(1,Math.abs(e)/0.6);return e>=0?`rgb(${Math.round(110-60*m)},${Math.round(165+15*m)},${Math.round(120-55*m)})`:`rgb(${Math.round(185+35*m)},${Math.round(115-70*m)},${Math.round(115-70*m)})`;}
function fieldBase(){
 const W=FGEO.W,T=FGEO.top,B=FGEO.bot;let m='';
 m+=`<rect x="0" y="0" width="${W}" height="${B+12}" fill="#eaf2ea"/>`;
 const tint=['#e4efe4','#edf4ed'];
 ZB.forEach(([nm,a,b],zi)=>{const y=ypos(a),h=ypos(b)-ypos(a);m+=`<rect x="0" y="${y.toFixed(1)}" width="${W}" height="${h.toFixed(1)}" fill="${tint[zi%2]}"/>`;
  m+=`<text x="${W-2.3}" y="${(y+h/2).toFixed(1)}" font-size="4.4" fill="#9bb19b" font-weight="800" text-anchor="middle" transform="rotate(90 ${W-2.3} ${(y+h/2).toFixed(1)})" letter-spacing="0.5">${nm}</text>`;});
 m+=`<rect x="0" y="0" width="${W}" height="${T}" fill="#16284a"/>`;
 m+=`<rect x="0" y="${B}" width="${W}" height="12" fill="#39404d"/>`;
 m+=`<text x="${W/2}" y="9.5" font-size="6" fill="#d4bd8a" font-weight="800" text-anchor="middle" letter-spacing="1.5">▲ ATTACKING (opp goal)</text>`;
 m+=`<text x="${W/2}" y="${B+8}" font-size="5" fill="#aeb4c0" font-weight="700" text-anchor="middle" letter-spacing="1">OWN GOAL LINE</text>`;
 for(let p=0;p<=100;p+=10){const y=ypos(p);const major=(p%50===0);m+=`<line x1="6" y1="${y.toFixed(1)}" x2="${W-6}" y2="${y.toFixed(1)}" stroke="${major?'#8fb38f':'#c0d4c0'}" stroke-width="${major?1:0.55}"/>`;}
 for(let p=10;p<=90;p+=10){const y=ypos(p);const n=p<=50?p:100-p;m+=`<text x="12" y="${(y+2.3).toFixed(1)}" font-size="6" fill="#93ac93" font-weight="800" text-anchor="middle">${n}</text><text x="${W-12}" y="${(y+2.3).toFixed(1)}" font-size="6" fill="#93ac93" font-weight="800" text-anchor="middle">${n}</text>`;}
 m+=`<line x1="6" y1="${T}" x2="6" y2="${B}" stroke="#8fb38f" stroke-width="1"/><line x1="${W-6}" y1="${T}" x2="${W-6}" y2="${B}" stroke="#8fb38f" stroke-width="1"/>`;
 return m;
}
const NFLNAMES={ARI:'Arizona Cardinals',ATL:'Atlanta Falcons',BAL:'Baltimore Ravens',BUF:'Buffalo Bills',CAR:'Carolina Panthers',CHI:'Chicago Bears',CIN:'Cincinnati Bengals',CLE:'Cleveland Browns',DAL:'Dallas Cowboys',DEN:'Denver Broncos',DET:'Detroit Lions',GB:'Green Bay Packers',HOU:'Houston Texans',IND:'Indianapolis Colts',JAX:'Jacksonville Jaguars',KC:'Kansas City Chiefs',LA:'Los Angeles Rams',LAC:'Los Angeles Chargers',LV:'Las Vegas Raiders',MIA:'Miami Dolphins',MIN:'Minnesota Vikings',NE:'New England Patriots',NO:'New Orleans Saints',NYG:'New York Giants',NYJ:'New York Jets',PHI:'Philadelphia Eagles',PIT:'Pittsburgh Steelers',SEA:'Seattle Seahawks',SF:'San Francisco 49ers',TB:'Tampa Bay Buccaneers',TEN:'Tennessee Titans',WAS:'Washington Commanders'};

function renderFieldChart(){

 CUR_SEL=sel;

  return `<circle class="fdot${ssel}" data-i="${i}" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r}" fill="${OUT[p[12]].c}" fill-opacity="0.82"${td?' stroke="#caa84e" stroke-width="1.3"':''}></circle>`;}).join('');

 const legend=`<div class="flegend">${Object.entries(OUT).map(([k,v])=>`<span class="lgchip${FFILT.vis[k]?'':' off'}" data-vis="${k}"><span class="lgdot" style="background:${v.c}"></span>${v.lab}</span>`).join('')}<span class="lgchip" style="cursor:default"><span class="lgdot" style="background:#fff;box-shadow:0 0 0 1.3px #caa84e inset"></span>TD</span></div>`;
 const detail=`<div class="fdetail" id="fdetail">${FFILT.sel!=null&&CUR_SEL[FFILT.sel]?passDetail(CUR_SEL[FFILT.sel]):'<span class="muted">Tap any throw to see the play detail.</span>'}</div>`;
 // aggregates over sel (all outcomes)
 const n=sel.length,comp=sel.filter(p=>p[12]==='C').length,intc=sel.filter(p=>p[12]==='N').length,td=sel.filter(p=>p[13]===1).length;
 const aDOT=fmean(sel.map(p=>p[4])),epa=fmean(sel.map(p=>p[10])),succ=fmean(sel.map(p=>p[11])),ypa=fmean(sel.map(p=>p[8]));
 const tiles=[['Throws',n],['Comp %',n?(100*comp/n).toFixed(0)+'%':'—'],['EPA/play',epa==null?'—':(epa>0?'+':'')+epa.toFixed(2)],['aDOT',aDOT==null?'—':aDOT.toFixed(1)]].map(t=>`<div class="fstat"><div class="v">${t[1]}</div><div class="l">${t[0]}</div></div>`).join('');
 const sub2=`<div class="note" style="margin:-6px 0 12px">Success ${succ==null?'—':(100*succ).toFixed(0)+'%'} · YPA ${ypa==null?'—':ypa.toFixed(1)} · ${td} TD · ${intc} INT</div>`;
 const zrows=ZN.map(nm=>{const s2=sel.filter(p=>zoneOf(p[6])===nm);return {nm,n:s2.length,e:fmean(s2.map(p=>p[10])),s:fmean(s2.map(p=>p[11]))};});
 const mx=Math.max(0.4,...zrows.map(z=>z.e==null?0:Math.abs(z.e)));
 const zoneBars=zrows.map(z=>{if(!z.n)return `<div class="fzrow"><span class="zl">${z.nm}</span><span class="zb"></span><span class="zv muted">—</span></div>`;
  const w=Math.min(49,Math.abs(z.e)/mx*49),pos=z.e>=0,left=pos?50:50-w,col=pos?'#1e7a34':'#b23b3b';

 const tg={};sel.forEach(p=>{if(!p[3])return;const t=tg[p[3]]||(tg[p[3]]={tgt:0,rec:0,yds:0,ep:[]});t.tgt++;if(p[12]==='C'){t.rec++;t.yds+=p[8]||0;}if(p[10]!=null)t.ep.push(p[10]);});

 const rt={};let rtot=0;sel.forEach(p=>{const r=p[18];if(r==null)return;(rt[r]=rt[r]||{n:0,ep:[]});rt[r].n++;if(p[10]!=null)rt[r].ep.push(p[10]);rtot++;});
 const routeRows=Object.keys(rt).sort((a,b)=>rt[b].n-rt[a].n).slice(0,9).map(r=>{const use=100*rt[r].n/rtot,e=fmean(rt[r].ep);return `<div class="persrow"><span class="pn" style="font-size:10.5px">${RT13[r]}</span><span class="pb" title="${rt[r].n} targets"><i style="width:${use.toFixed(0)}%"></i></span><span class="relval" style="color:${e==null?'#888':(e>=0?'#1e7a34':'#b23b3b')}">${e==null?'—':(e>0?'+':'')+e.toFixed(2)}</span><span class="relrk">${use.toFixed(0)}%</span></div>`;}).join('');
 const routePanel=rtot?`<div class="fsub" style="margin-top:14px">Route distribution <span class="hint">of ${rtot} charted targets</span></div>${routeRows}`:'';

 body.innerHTML=`<div class="card"><div class="fieldwrap"><div><div class="fctrls">${qbSel}${recSel}</div><div class="fsvgwrap">${svg}</div>${legend}${detail}</div><div class="fagg">${agg}</div></div><p class="note">Each dot is a throw, placed at its <b>target's field position</b> (line of scrimmage − air yards) and passing lane (jittered L/M/R). Colored by outcome; gold ring = touchdown. Tap a throw for detail. ${teamName(curFZTeam)} · 2025.</p></div>`;

 const zoneBars=zrows.map(z=>{if(!z.n)return `<div class="fzrow"><span class="zl">${z.nm}</span><span class="zb"></span><span class="zv muted">—</span></div>`;

  return `<div class="fzrow" title="${z.n} carries"><span class="zl">${z.nm}</span><span class="zb"><i style="left:50%;width:1.2px;background:#9aa3b0"></i><i style="left:${left.toFixed(1)}%;width:${w.toFixed(1)}%;background:${col}"></i></span><span class="zv" style="color:${col}">${pos?'+':''}${z.e.toFixed(2)}</span></div>`;}).join('');
 const cg={};sel.forEach(p=>{const t=cg[p[2]]||(cg[p[2]]={c:0,y:0,ep:[],td:0});t.c++;t.y+=p[7]||0;if(p[8]!=null)t.ep.push(p[8]);if(p[10]===1)t.td++;});
 const crows=Object.entries(cg).sort((a,b)=>b[1].c-a[1].c).slice(0,8).map(([run,t])=>{const e=fmean(t.ep);return `<tr data-run="${run}" class="${FFILT.run===run?'sel':''}"><td>${run}</td><td>${t.c}</td><td>${(t.y/t.c).toFixed(1)}</td><td>${t.td}</td><td>${e==null?'—':(e>0?'+':'')+e.toFixed(2)}</td></tr>`;}).join('');
 const carTable=`<table class="frecs"><thead><tr><th>Carrier</th><th>Att</th><th>Y/C</th><th>TD</th><th>EPA</th></tr></thead><tbody>${crows||'<tr><td colspan="5" class="muted">no carries</td></tr>'}</tbody></table>`;
 const agg=`<div class="fsub">${FFILT.run==='ALL'?'All ball carriers':FFILT.run} — 2025</div><div class="fstatrow">${tiles}</div>${sub2}${dirMix}${gridHTML}<div class="fsub" style="margin-top:14px">EPA / play by field zone</div>${zoneBars}${zdHTML}<div class="fsub" style="margin-top:14px">Top carriers <span class="hint">tap a row to filter</span></div>${carTable}`;
 body.innerHTML=`<div class="card"><div class="fieldwrap"><div><div class="fctrls">${runSel}</div><div class="fsvgwrap">${svg}</div>${legend}${detail}</div><div class="fagg">${agg}</div></div><p class="note">Each dot is a carry at its line of scrimmage, by run direction (jittered L/M/R). Colored by EPA (red = lost value, green = gained); gold ring = touchdown. Tap a carry for detail. ${teamName(curFZTeam)} · 2025.</p></div>`;
 bindFieldChart();
}
function runDetail(p){return `<div class="big">${p[2]} <span style="color:${epaColor(p[8])}">●</span></div><div>${GAPN[p[3]]!=null?'off '+(DIRN[p[4]]||'')+' '+GAPN[p[3]]:(DIRN[p[4]]||'')+' side'} · ${p[7]} yds${p[10]?' · TD':''}${p[11]?' · FUMBLE LOST':''}</div><div class="muted">Wk ${p[0]} vs ${p[1]} · from ${fieldDesc(p[5])} · ${p[6]!=null?p[6]+(['','st','nd','rd','th'][p[6]]||'th')+' down · ':''}EPA ${p[8]==null?'—':(p[8]>0?'+':'')+p[8]}</div>`;}
function bindFieldChart(){
 const body=$('#fieldbody');if(!body)return;
 const qb=$('#fqb');if(qb)qb.onchange=e=>{FFILT.qb=e.target.value;FFILT.rec='ALL';FFILT.sel=null;renderFieldChart();};
 const rec=$('#frec');if(rec)rec.onchange=e=>{FFILT.rec=e.target.value;FFILT.sel=null;renderFieldChart();};
 const run=$('#frun');if(run)run.onchange=e=>{FFILT.run=e.target.value;FFILT.sel=null;renderFieldChart();};
 body.querySelectorAll('.lgchip[data-vis]').forEach(c=>c.onclick=()=>{FFILT.vis[c.dataset.vis]=!FFILT.vis[c.dataset.vis];renderFieldChart();});
 body.querySelectorAll('.frecs tbody tr[data-rec]').forEach(r=>r.onclick=()=>{FFILT.rec=FFILT.rec===r.dataset.rec?'ALL':r.dataset.rec;FFILT.sel=null;renderFieldChart();});
 body.querySelectorAll('.frecs tbody tr[data-run]').forEach(r=>r.onclick=()=>{FFILT.run=FFILT.run===r.dataset.run?'ALL':r.dataset.run;FFILT.sel=null;renderFieldChart();});
 const svgEl=$('#fsvg');if(svgEl)svgEl.addEventListener('click',ev=>{const c=ev.target.closest('.fdot');if(!c)return;const i=+c.dataset.i;FFILT.sel=i;const det=$('#fdetail');if(det)det.innerHTML=FIELDMODE==='run'?runDetail(CUR_SEL[i]):passDetail(CUR_SEL[i]);svgEl.querySelectorAll('.fdot.sel').forEach(x=>x.classList.remove('sel'));c.classList.add('sel');});
}

function renderPhil(){
 const s=$('#philosophy');const divs=Object.keys(DATA.philosophy);
 s.innerHTML=`${pageHead('philosophy')}
 <div class="subnav"><select id="divsel"><option value="ALL">All divisions</option>${divs.map(d=>`<option>${d}</option>`).join('')}</select></div><div id="philbody"></div>`;
 $('#divsel').onchange=e=>drawPhil(e.target.value);drawPhil('ALL');
}
function drawPhil(sel){const box=$('#philbody');const divs=Object.keys(DATA.philosophy).filter(d=>sel=='ALL'||d==sel);
 box.innerHTML=divs.map(d=>`<div class="card"><div class="sechead">${d}</div><div class="scroll"><table><thead><tr><th class="tl">Team</th><th class="tl">HC</th><th class="tl">OC</th><th class="tl">DC</th><th class="tl">Offensive System & Lineage</th><th class="tl">Defensive Scheme & Lineage</th></tr></thead><tbody>${DATA.philosophy[d].map(r=>`<tr class="${r[0].includes('Saints')?'no':''}"><td class="tl"><b>${r[0]}</b></td><td class="tl">${r[1]}</td><td class="tl">${r[2]}</td><td class="tl">${r[3]}</td><td class="tl" style="white-space:normal;min-width:230px">${r[4]}</td><td class="tl" style="white-space:normal;min-width:230px">${r[5]}</td></tr>`).join('')}</tbody></table></div></div>`).join('');
}

function tbl(rows,cols,noKey){return `<div class="scroll"><table><thead><tr>${cols.map((c,i)=>`<th class="${i==0?'tl':''}">${c.lab}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="${r[noKey]=='NO'?'no':''}">${cols.map((c,i)=>{let v=r[c.k];let st='';if(c.heat&&typeof v==='number'){st=heat(v,c.heat[0],c.heat[1]);}return `<td class="${i==0?'tl':''}" style="${st}">${v==null?'—':(c.fmt?c.fmt(v):v)}</td>`}).join('')}</tr>`).join('')}</tbody></table></div>`;}
function epaScatter(){const T=DATA.leagueEPA.teams,lg=DATA.leagueEPA.lgOff;const ox=T.map(t=>t.off.epa),dx=T.map(t=>t.deff.epa);const oMin=Math.min(...ox,lg),oMax=Math.max(...ox,lg),dMin=Math.min(...dx,lg),dMax=Math.max(...dx,lg);const W=760,H=500,p=58;const X=v=>p+(v-oMin)/(oMax-oMin)*(W-2*p),Y=v=>p+(v-dMin)/(dMax-dMin)*(H-2*p);const cx=X(lg).toFixed(1),cy=Y(lg).toFixed(1);const pts=T.map(t=>{const x=X(t.off.epa).toFixed(1),y=Y(t.deff.epa).toFixed(1);const no=t.abbr=='NO';return `<circle cx="${x}" cy="${y}" r="${no?5.5:3.2}" fill="${no?'#D3BC8D':'#2e5496'}"/><text x="${(+x+5)}" y="${(+y+3.5)}" font-size="10" fill="${no?'#000':'#444'}" font-weight="${no?'700':'400'}">${t.abbr}</text>`;}).join('');return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:760px;background:#fff;border:1px solid #e3e7ee;border-radius:8px"><line x1="${cx}" y1="${p}" x2="${cx}" y2="${H-p}" stroke="#cfd6e0" stroke-dasharray="4"/><line x1="${p}" y1="${cy}" x2="${W-p}" y2="${cy}" stroke="#cfd6e0" stroke-dasharray="4"/><text x="${W-p}" y="${H-p+32}" text-anchor="end" font-size="11" fill="#666">Offense EPA/play → (better)</text><text x="14" y="${p-22}" font-size="11" fill="#666">↑ Better defense</text><text x="${W-p}" y="${p-10}" text-anchor="end" font-size="10" fill="#1e7a34" font-weight="700">Good O · Good D</text>${pts}</svg>`;}
function renderEPA(){const s=$('#epa');s.innerHTML=`${pageHead('epa')}<div class="subnav" id="esub"></div><div id="ebody"></div>`;const subs=[['ov','League-Wide'],['off','Offense'],['def','Defense'],['qb','Quarterbacks'],['neutral','Neutral Pass Freq'],['proe','Pass Over Expected'],['fourth','Fourth Downs'],['luck','Luck'],['series','Series Success']];const es=$('#esub');subs.forEach(([id,lab],i)=>{const b=document.createElement('button');b.textContent=lab;if(i==0)b.classList.add('on');b.onclick=()=>{document.querySelectorAll('#esub button').forEach(x=>x.classList.remove('on'));b.classList.add('on');drawEPA(id);};es.appendChild(b);});drawEPA('ov');}
function barChart(items,o){
 const W=Math.max(560,items.length*(o.bw||22)+70),H=o.h||250,p={l:48,r:10,t:16,b:o.b||30};
 const vs=items.map(i=>i.v);const mn=Math.min(0,...vs),mx=Math.max(0,...vs);
 const Y=v=>p.t+(mx-v)/(mx-mn||1)*(H-p.t-p.b);const bw=(W-p.l-p.r)/items.length;
 let ax='';for(let i=0;i<=4;i++){const v=mn+(mx-mn)*i/4;const y=Y(v);ax+=`<line x1="${p.l}" y1="${y.toFixed(1)}" x2="${W-p.r}" y2="${y.toFixed(1)}" stroke="#eef1f6"/><text x="${p.l-4}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="8.5" fill="#888">${v.toFixed(o.dec==null?2:o.dec)}</text>`;}
 let bars='',labs='';
 items.forEach((it,i)=>{const x=p.l+i*bw,y0=Y(0),y=Y(it.v);
  const col=it.hl?'#D3BC8D':(it.v>=0?'#2e5496':'#b06a10');
  bars+=`<rect x="${(x+1).toFixed(1)}" y="${Math.min(y,y0).toFixed(1)}" width="${Math.max(1,bw-2).toFixed(1)}" height="${Math.max(1,Math.abs(y-y0)).toFixed(1)}" fill="${col}"><title>${it.title||it.lab}: ${it.v}</title></rect>`;
  const lx=x+bw/2;
  labs+=o.rot?`<text x="${lx.toFixed(1)}" y="${H-p.b+10}" transform="rotate(-52 ${lx.toFixed(1)} ${H-p.b+10})" text-anchor="end" font-size="7.5" font-weight="${it.hl?'800':'400'}" fill="${it.hl?'#7a6420':'#555'}">${it.lab}</text>`:`<text x="${lx.toFixed(1)}" y="${H-p.b+10}" text-anchor="middle" font-size="8" font-weight="${it.hl?'800':'400'}" fill="${it.hl?'#7a6420':'#555'}">${it.lab}</text>`;});
 const zero=`<line x1="${p.l}" y1="${Y(0).toFixed(1)}" x2="${W-p.r}" y2="${Y(0).toFixed(1)}" stroke="#9aa3b2"/>`;
 const avg=o.avg!=null?`<line x1="${p.l}" y1="${Y(o.avg).toFixed(1)}" x2="${W-p.r}" y2="${Y(o.avg).toFixed(1)}" stroke="#a23b3b" stroke-dasharray="4 3"/><text x="${W-p.r}" y="${(Y(o.avg)-3).toFixed(1)}" text-anchor="end" font-size="8" fill="#a23b3b">lg avg</text>`:'';
 return `<div class="scroll"><svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:${Math.min(W,920)}px;background:#fff;border:1px solid var(--line);border-radius:8px"><text x="10" y="11" font-size="9.5" font-weight="700" fill="#555">${o.label||''}</text>${ax}${zero}${avg}${bars}${labs}</svg></div>`;
}
function drawEPA(id){const L=DATA.leagueEPA;const box=$('#ebody');const mm=(arr,k)=>{const v=arr.map(x=>x[k]).filter(x=>typeof x==='number');return [Math.min(...v),Math.max(...v)];};
 if(id=='ov'){box.innerHTML=`<div class="card">${epaScatter()}<p class="note">Both sides of the ball on one view — right and high is good. Single-variable breakdowns (with sortable tables) live in the Offense, Defense and Quarterbacks tabs.</p></div>`;}
 else
 if(id=='off'){const R=L.teams.map(t=>({name:t.name,abbr:t.abbr,...t.off})).sort((a,b)=>b.epa-a.epa);const e=mm(R,'epa');box.innerHTML=`<div class="card">${barChart(R.map(t=>({lab:t.abbr,v:t.epa,hl:t.abbr=='NO',title:t.name})),{avg:L.lgOff,label:'Offense EPA/play — sorted best → worst',dec:2})}</div><div class="card">${tbl(R,[{k:'name',lab:'Team'},{k:'epa',lab:'EPA/play',fmt:v=>v.toFixed(3),heat:e},{k:'succ',lab:'Success %'},{k:'passEPA',lab:'Pass EPA',fmt:v=>v.toFixed(3)},{k:'rushEPA',lab:'Rush EPA',fmt:v=>v.toFixed(3)},{k:'edEPA',lab:'Early-down EPA',fmt:v=>v.toFixed(3)}],'abbr')}<p class="note">Offensive EPA per play; higher = better. Chart dashed lines = league average.</p></div>`;}
 else if(id=='def'){const R=L.teams.map(t=>({name:t.name,abbr:t.abbr,...t.deff})).sort((a,b)=>a.epa-b.epa);const e=mm(R,'epa');box.innerHTML=`<div class="card">${barChart(R.map(t=>({lab:t.abbr,v:t.epa,hl:t.abbr=='NO',title:t.name})),{avg:L.lgOff,label:'Defense EPA/play allowed — sorted best → worst (lower is better)',dec:2})}</div><div class="card">${tbl(R,[{k:'name',lab:'Team'},{k:'epa',lab:'EPA/play allowed',fmt:v=>v.toFixed(3),heat:[e[1],e[0]]},{k:'succ',lab:'Success % allowed'},{k:'passEPA',lab:'Pass EPA',fmt:v=>v.toFixed(3)},{k:'rushEPA',lab:'Rush EPA',fmt:v=>v.toFixed(3)},{k:'edEPA',lab:'Early-down EPA',fmt:v=>v.toFixed(3)}],'abbr')}<p class="note">Defensive EPA per play allowed; lower = better.</p></div>`;}
 else if(id=='qb'){const R=[...L.qbs].sort((a,b)=>b.epa-a.epa);const e=mm(R,'epa');const qavg=R.reduce((s,q)=>s+q.epa,0)/R.length;box.innerHTML=`<div class="card">${barChart(R.map(q=>({lab:q.qb,v:q.epa,hl:q.team=='NO',title:q.qb+' ('+q.team+')'})),{avg:qavg,label:'QB EPA/play (min 200 dropbacks) — sorted best → worst',dec:2,rot:1,b:56,h:280,bw:19})}</div><div class="card">${tbl(R,[{k:'qb',lab:'Quarterback'},{k:'team',lab:'Tm'},{k:'db',lab:'Dropbacks'},{k:'epa',lab:'EPA/play',fmt:v=>v.toFixed(3),heat:e},{k:'cpoe',lab:'CPOE'},{k:'succ',lab:'Success %'}],'team')}<p class="note">Min 200 dropbacks. EPA/play on all dropbacks; CPOE = completion % over expected.</p></div>`;}
 else if(id=='neutral'){const R=[...L.neutral].sort((a,b)=>b.neutralPass-a.neutralPass);const e=mm(R,'neutralPass');box.innerHTML=`<div class="card">${tbl(R,[{k:'name',lab:'Team'},{k:'neutralPass',lab:'Neutral pass %',heat:e},{k:'overallPass',lab:'Overall pass %'}],'abbr')}<p class="note">Neutral = 1st/2nd down, win prob 20–80%, outside the final 2:00 — the cleanest pass-vs-run identity.</p></div>`;}
 else if(id=='proe'){const R=[...L.proe].sort((a,b)=>b.proe-a.proe);const e=mm(R,'proe');box.innerHTML=`<div class="card">${tbl(R,[{k:'name',lab:'Team'},{k:'proe',lab:'PROE',heat:e},{k:'cpoe',lab:'CPOE'}],'abbr')}<p class="note">PROE = pass rate over expected (+ = pass more than the situation dictates). CPOE = completion % over expected.</p></div>`;}
 else if(id=='fourth'){const R=[...L.fourth].sort((a,b)=>(b.goRate||0)-(a.goRate||0));const e=mm(R,'goRate');box.innerHTML=`<div class="card">${tbl(R,[{k:'name',lab:'Team'},{k:'dec',lab:'4th-down decisions'},{k:'go',lab:'Go-for-it'},{k:'goRate',lab:'Go rate %',heat:e},{k:'conv',lab:'Conversions'},{k:'convRate',lab:'Convert %'}],'abbr')}<p class="note">Descriptive 4th-down aggressiveness (go rate among go/punt/FG decisions) and conversion rate — not a model-based decision grade.</p></div>`;}
 else if(id=='luck'){const R=L.luck.map(x=>({...x,osrec:x.osW+'-'+x.osL}));box.innerHTML=`<div class="card">${tbl(R,[{k:'name',lab:'Team'},{k:'osrec',lab:'1-score record'},{k:'fumRec',lab:'Fumble recovery %'},{k:'toMargin',lab:'TO margin / game'}],'abbr')}<p class="note">Luck indicators (approximation of rbsdm's view): one-score game record (≤8 pts), fumble-recovery rate (≈50% neutral), turnover margin per game.</p></div>`;}
 else if(id=='series'){const R=[...L.series].sort((a,b)=>b.off-a.off);const e=mm(R,'off');box.innerHTML=`<div class="card">${tbl(R,[{k:'name',lab:'Team'},{k:'off',lab:'Off series success %',heat:e},{k:'deff',lab:'Def series success % allowed'}],'abbr')}<p class="note">Series success = % of down series ending in a first down or TD. Offense higher = better; defense lower = better.</p></div>`;}
}

// ---------- SORTABLE TABLES + DYNAMIC RANK ----------
function srtVal(td){const t=td.textContent.trim();if(t===''||t==='—')return null;const x=parseFloat(t.replace(/[%↑↓+]/g,''));return isNaN(x)?t.toLowerCase():x;}
function renumberTable(table){if(table.dataset.ranked!=='1')return;let i=1;[...table.tBodies[0].rows].forEach(r=>{r.cells[0].textContent=r.classList.contains('lg')?'':i++;});}
function addRankCol(table){
 if(table.dataset.ranked)return;
 const tb=table.tBodies[0],hrow=table.tHead&&table.tHead.rows[0];
 if(!tb||!hrow){if(table.dataset)table.dataset.ranked='0';return;}
 const dataRows=[...tb.rows].filter(r=>!r.classList.contains('lg'));
 const k=hrow.cells[0].textContent.trim().toLowerCase();
 const entity=k==='#'||k.startsWith('team')||k.startsWith('opponent')||k.startsWith('quarterback')||k.startsWith('route')||k.startsWith('coverage')||k.startsWith('personnel');
 if(dataRows.length<6||!entity){table.dataset.ranked='0';return;}
 if(k==='#'){table.dataset.ranked='1';renumberTable(table);return;}
 const th=document.createElement('th');th.textContent='#';th.dataset.rk='1';hrow.insertBefore(th,hrow.cells[0]);
 [...tb.rows].forEach(r=>{const td=r.insertCell(0);td.className='rkc';});
 table.dataset.ranked='1';renumberTable(table);
}
function scanTables(){document.querySelectorAll('main table:not([data-ranked])').forEach(t=>{try{addRankCol(t)}catch(_){}});}
const rkObs=new MutationObserver(()=>{rkObs.disconnect();scanTables();rkObs.observe(document.querySelector('main'),{childList:true,subtree:true});});
rkObs.observe(document.querySelector('main'),{childList:true,subtree:true});
document.addEventListener('click',e=>{
 const th=e.target.closest('th');if(!th)return;
 const table=th.closest('table');if(!table||!table.tBodies.length||!table.tHead)return;
 if(table.tHead.rows.length>1)return;
 const ci=[...th.parentNode.children].indexOf(th);
 if(table.dataset.ranked==='1'&&ci===0)return;
 const tb=table.tBodies[0];const all=[...tb.rows];
 const pin=all.filter(r=>r.classList.contains('lg'));
 const rows=all.filter(r=>!r.classList.contains('lg'));
 if(rows.length<3)return;
 let dir;
 if(table.dataset.sc===String(ci)){dir=table.dataset.sd==='1'?-1:1;}
 else{const sample=rows.map(r=>r.cells[ci]&&srtVal(r.cells[ci])).filter(v=>v!=null);dir=(sample.length&&typeof sample[0]==='number')?-1:1;}
 table.dataset.sc=String(ci);table.dataset.sd=dir===1?'1':'-1';
 rows.sort((a,b)=>{const va=a.cells[ci]?srtVal(a.cells[ci]):null,vb=b.cells[ci]?srtVal(b.cells[ci]):null;
  if(va==null&&vb==null)return 0;if(va==null)return 1;if(vb==null)return -1;
  if(typeof va==='number'&&typeof vb==='number')return dir===-1?vb-va:va-vb;
  return dir*String(va).localeCompare(String(vb));});
 rows.forEach(r=>tb.appendChild(r));pin.forEach(r=>tb.appendChild(r));
 renumberTable(table);
});
scanTables();
