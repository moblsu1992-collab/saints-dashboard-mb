name: Deploy to GitHub Pages

# Robust replacement for the legacy "Deploy from a branch" pipeline, whose
# GitHub-side "Deploy to GitHub Pages" step fails intermittently. This uses the
# official Actions deployment path (upload-pages-artifact + deploy-pages).
# configure-pages with enablement:true flips the Pages source to "GitHub Actions"
# on first run, so no manual settings change is required.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-progress deploy; queue instead (avoids the race that fails deploys).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (switch source to GitHub Actions if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
